<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProductFinder Mobile</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #f6f7f9;
      color: #111827;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 20px;
    }
    h1 { margin: 0 0 10px; font-size: 20px; }
    p { margin: 0; color: #4b5563; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ProductFinder Mobile</h1>
    <p>
      This app loads your backend URL configured in <code>capacitor.config.json</code>.
      Set <code>server.url</code> and rebuild.
    </p>
  </div>
</body>
</html>
