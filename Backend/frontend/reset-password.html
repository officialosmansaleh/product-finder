<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Laiting Reset Password</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbe4ee;--pri:#c76a00;--pri2:#a85a00}
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#fff 0%,var(--bg) 45%,#eaf0f7 100%);color:var(--ink)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{width:min(520px,100%);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 20px 45px rgba(15,23,42,.08)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .brandLogoLink{display:inline-flex;align-items:center;line-height:0}
    .brand img{height:34px}
    .title{font-size:22px;font-weight:800;margin:0}
    .sub{font-size:13px;color:var(--muted);line-height:1.45;margin:6px 0 0}
    .field{display:grid;gap:8px;margin-top:14px}
    .field label{font-size:12px;font-weight:700;color:#334155}
    .field input{padding:12px;border:1px solid var(--line);border-radius:12px;font-size:14px}
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:16px}
    .btn{padding:11px 14px;border:0;border-radius:12px;background:var(--pri);color:#fff;cursor:pointer}
    .btn:hover{background:var(--pri2)}
    .btn.secondary{background:#111827}
    .notice{margin-top:14px;padding:11px 12px;border-radius:12px;background:#eef6ff;color:#355070;border:1px solid #cfe1f7;font-size:13px}
    .notice.error{background:#fff1f2;color:#9f1239;border-color:#fecdd3}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="brand">
        <a class="brandLogoLink" href="/frontend/" aria-label="Go to Laiting home">
          <img src="/frontend/laiting-logo-ai.png" alt="Laiting logo" />
        </a>
        <div>
          <h1 class="title">Reset password</h1>
          <p class="sub">Set a new password for your Laiting account. Use at least 10 characters with letters and numbers.</p>
        </div>
      </div>

      <div class="field">
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" autocomplete="new-password" />
      </div>

      <div class="actions">
        <button id="btnResetPassword" class="btn" type="button">Update password</button>
        <button id="btnBackToFinder" class="btn secondary" type="button">Back to Home</button>
      </div>

      <div id="resetNotice" class="notice">Waiting for your new password.</div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    function setNotice(message, isError){
      const el = $("resetNotice");
      if (!el) return;
      el.textContent = String(message || "").trim();
      el.className = `notice${isError ? " error" : ""}`;
    }
    async function resetPassword(){
      const token = new URLSearchParams(window.location.search).get("token") || "";
      const password = String($("newPassword")?.value || "");
      const confirm = String($("confirmPassword")?.value || "");
      if (!token) {
        setNotice("The reset link is missing its token.", true);
        return;
      }
      if (!password) {
        setNotice("Enter your new password first.", true);
        $("newPassword")?.focus();
        return;
      }
      if (password !== confirm) {
        setNotice("The two passwords do not match.", true);
        $("confirmPassword")?.focus();
        return;
      }
      try{
        setNotice("Updating your password...", false);
        const res = await fetch("/auth/password-reset/confirm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password }),
        });
        let data = null;
        try { data = await res.json(); } catch (_e) {}
        if (!res.ok) throw new Error((data && (data.detail || data.message)) || res.statusText || "Request failed");
        setNotice("Password updated. You can now sign in with the new password.", false);
        setTimeout(() => { window.location.href = "/frontend/"; }, 1200);
      }catch(error){
        setNotice(String(error.message || error), true);
      }
    }
    $("btnResetPassword")?.addEventListener("click", resetPassword);
    $("btnBackToFinder")?.addEventListener("click", () => { window.location.href = "/frontend/"; });
    $("confirmPassword")?.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      resetPassword();
    });
  </script>
</body>
</html>
