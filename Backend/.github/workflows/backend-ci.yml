name: Backend CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/backend-ci.yml"
      - "app/**"
      - "frontend/**"
      - "tests/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "requirements.txt"
      - ".env.example"
      - ".env.docker.example"
      - ".env.prod.example"
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "app/**"
      - "frontend/**"
      - "tests/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "requirements.txt"
      - ".env.example"
      - ".env.docker.example"
      - ".env.prod.example"
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile backend
        run: python -m compileall app

      - name: Run backend tests
        env:
          AUTH_JWT_SECRET: ci-test-secret-0123456789abcdefghijklmnopqrstuvwxyz
        run: python -m pytest -q tests

      - name: Build Docker image
        run: docker build -t productfinder-backend-ci .
